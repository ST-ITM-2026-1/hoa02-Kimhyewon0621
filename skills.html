<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skills | Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <nav class="navbar">
            <p class="logo">MyPortfolio</p>
            
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="skills.html" class="active">Skills</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>

            <div class="theme-switch">
                <span class="theme-label">☀️</span>
                <label class="switch">
                    <input type="checkbox" id="theme-toggle">
                    <span class="slider"></span>
                </label>
                <span class="theme-label">🌙</span>
            </div>
        </nav>
    </header>

    <main>

        <section class="page-header">
            <h1>My Skills</h1>
        </section>

        <section class="skills">

            <article class="skill-group paper-card">
                <ul class="skill-list">
                    <li>
                        <div class="skill-label">
                            <span>Java</span>
                        </div>
                        <div class="skill-bar">
                            <div class="skill-fill" style="width: 75%;"></div>
                        </div>
                    </li>
                    <li>
                        <div class="skill-label">
                            <span>Python</span>
                        </div>
                        <div class="skill-bar">
                            <div class="skill-fill" style="width: 60%;"></div>
                        </div>
                    </li>
                    <li>
                        <div class="skill-label">
                            <span>SQL</span>
                        </div>
                        <div class="skill-bar">
                            <div class="skill-fill" style="width: 55%;"></div>
                        </div>
                    </li>
                    <li>
                        <div class="skill-label">
                            <span>HTML</span>
                        </div>
                        <div class="skill-bar">
                            <div class="skill-fill" style="width: 50%;"></div>
                        </div>
                    </li>
                    <li>
                        <div class="skill-label">
                            <span>CSS</span>
                        </div>
                        <div class="skill-bar">
                            <div class="skill-fill" style="width: 40%;"></div>
                        </div>
                    </li>
                    <li>
                        <div class="skill-label">
                            <span>JavaScript</span>
                        </div>
                        <div class="skill-bar">
                            <div class="skill-fill" style="width: 40%;"></div>
                        </div>
                    </li>
                </ul>
            </article>

            <article class="skill-group paper-card">
                <h2>Tools</h2>
                <ul class="tools-grid">
                    <li>Git</li>
                    <li>GitHub</li>
                    <li>VS Code</li>
                    <li>Linux</li>
                    <li>Figma</li>
                </ul>
            </article>

        </section>

    </main>
    
    <footer>
        <p>&copy; 2026 Kim Hyewon. All rights reserved.</p>
    </footer>
    <script src="script.js"></script>

</body>

</html>
